version: '3'
services:
  # Primer worker
  worker1:
    build: .
    environment:
      - WORKER_ID=1   # cada worker tiene un ID único
    ports:
      - "8001:8000"

  # Segundo worker
  worker2:
    build: .
    environment:
      - WORKER_ID=2
    ports:
      - "8002:8000"

  # Tercer worker
  worker3:
    build: .
    environment:
      - WORKER_ID=3
    ports:
      - "9000:8000"

  # Balanceador de carga con Nginx
  nginx:
    image: nginx:latest
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "8080:80"